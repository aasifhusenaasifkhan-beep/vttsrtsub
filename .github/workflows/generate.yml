name: Subtitle Generator Workflow

on:
  workflow_dispatch:
    inputs:
      task_type:
        required: true
      file_id:
        required: true
      format_type:
        required: true
      chat_id:
        required: true
      msg_id:
        required: true
      file_name:
        required: true
      style_type:
        required: true

concurrency:
  group: sub-generator-queue
  cancel-in-progress: false

jobs:
  generate_job:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run Generator Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TASK_TYPE: ${{ github.event.inputs.task_type }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          FORMAT_TYPE: ${{ github.event.inputs.format_type }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MSG_ID: ${{ github.event.inputs.msg_id }}
          FILE_NAME: ${{ github.event.inputs.file_name }}
          STYLE_TYPE: ${{ github.event.inputs.style_type }}
        run: python generator.py
